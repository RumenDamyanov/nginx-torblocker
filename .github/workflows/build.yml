name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Run tests
        run: |
          chmod +x test.sh
          ./test.sh

      - name: Build package
        run: |
          chmod +x build-package.sh
          ./build-package.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v3
        with:
          name: debian-package
          path: dist/*.deb
