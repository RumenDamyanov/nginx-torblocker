# Example nginx configuration for nginx-torblocker module
# Load the module at the top of your nginx.conf

load_module modules/ngx_http_torblocker_module.so;

events {
    worker_connections 1024;
}

http {
    # Required: DNS resolver for fetching the Tor exit list
    # Options: 1.1.1.1 (Cloudflare), 9.9.9.9 (Quad9), or local: 127.0.0.53 (systemd-resolved)
    resolver 1.1.1.1 9.9.9.9 valid=300s;
    resolver_timeout 5s;
    
    # Optional: URL for Tor exit node list (default is Tor Project's list)
    # HTTPS is supported if nginx was built with SSL (--with-http_ssl_module)
    # torblock_list_url "https://check.torproject.org/torbulkexitlist";
    # For nginx without SSL, use HTTP:
    # torblock_list_url "http://check.torproject.org/torbulkexitlist";
    
    # Optional: How often to fetch the list (in milliseconds)
    # Default: 3600000 (1 hour)
    torblock_update_interval 3600000;

    server {
        listen 80;
        server_name localhost;

        # Enable Tor blocking for this server
        torblock on;

        location / {
            root /var/www/html;
            index index.html;
        }

        # Allow Tor for public content
        location /public {
            torblock off;
        }
    }
}
