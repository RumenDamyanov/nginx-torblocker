# Example nginx configuration for nginx-torblocker module
# Load the module at the top of your nginx.conf

load_module modules/ngx_http_torblocker_module.so;

events {
    worker_connections 1024;
}

http {
    # Required: DNS resolver for fetching the Tor exit list
    # Options: 1.1.1.1 (Cloudflare), 9.9.9.9 (Quad9), or local: 127.0.0.53 (systemd-resolved)
    resolver 1.1.1.1 9.9.9.9 valid=300s;
    resolver_timeout 5s;
    
    # Optional: URL for Tor exit node list (default is Tor Project's list)
    # HTTPS is supported if nginx was built with SSL (--with-http_ssl_module)
    # torblock_list_url "https://check.torproject.org/torbulkexitlist";
    # For nginx without SSL, use HTTP:
    # torblock_list_url "http://check.torproject.org/torbulkexitlist";
    
    # Optional: How often to fetch the list (in milliseconds)
    # Default: 3600000 (1 hour)
    torblock_update_interval 3600000;

    # ===========================================
    # Example 1: Block Tor traffic for entire server
    # ===========================================
    server {
        listen 8001;
        server_name localhost;

        # Block Tor traffic
        torblock on;

        location / {
            return 200 "Tor traffic is BLOCKED here\n";
            add_header Content-Type text/plain;
        }
    }

    # ===========================================
    # Example 2: Allow all traffic (default)
    # ===========================================
    server {
        listen 8002;
        server_name localhost;

        # Allow all traffic (Tor and clearnet)
        torblock off;

        location / {
            return 200 "All traffic allowed here\n";
            add_header Content-Type text/plain;
        }
    }

    # ===========================================
    # Example 3: Tor-only mode (block clearnet)
    # ===========================================
    server {
        listen 8003;
        server_name localhost;

        # Allow ONLY Tor traffic - clearnet is blocked
        torblock only;

        location / {
            return 200 "Only Tor traffic allowed here\n";
            add_header Content-Type text/plain;
        }
    }

    # ===========================================
    # Example 4: Mixed policies per location
    # ===========================================
    server {
        listen 8004;
        server_name localhost;

        # Default: allow all traffic
        torblock off;

        location / {
            return 200 "Public area - all traffic allowed\n";
            add_header Content-Type text/plain;
        }

        # Admin area - block Tor
        location /admin {
            torblock on;
            return 200 "Admin area - Tor blocked\n";
            add_header Content-Type text/plain;
        }

        # Anonymous submission - Tor only
        location /submit {
            torblock only;
            return 200 "Submission portal - Tor only\n";
            add_header Content-Type text/plain;
        }
    }
}
